name: secrecy
on:
  push:
    branches: [ "main" ]

jobs:
    through_into:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: through_into
          run: |
            npm install
            timeout 347m node secrecy.js
  
